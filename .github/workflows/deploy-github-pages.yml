# Publishes frontend/dist to branch gh-pages.
# Settings → Pages → Source: Deploy from a branch → gh-pages / root
# Repo secret VITE_API_URL = backend HTTPS root (no /api). Optional repo var VITE_BASE_PATH.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE="${VITE_BASE_PATH}"
          if [ -z "$BASE" ]; then BASE="/${REPO}/"; fi
          export VITE_BASE_PATH="$BASE"
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then echo "::warning::Repository secret VITE_API_URL is unset; set it in repo Settings → Secrets." >&2; fi
          npm ci
          npm run build

      - name: No Jekyll processing
        run: touch frontend/dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          single-commit: true
          clean: true
