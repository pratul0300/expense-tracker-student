# Publishes frontend/dist to branch gh-pages. Avoids deploy-pages API (404 if Pages not set to "GitHub Actions").
# Settings → Pages → Build and deployment → Source: Deploy from a branch → Branch: gh-pages / folder: / (root)
# Secret VITE_API_URL = backend HTTPS root (no /api). Optional var VITE_BASE_PATH overrides default /<repo>/.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE="${VITE_BASE_PATH}"
          if [ -z "$BASE" ]; then BASE="/${REPO}/"; fi
          export VITE_BASE_PATH="$BASE"
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then echo "::warning::Repository secret VITE_API_URL is unset; set it in repo Settings → Secrets." >&2; fi
          npm ci
          npm run build

      - name: No Jekyll processing
        run: touch frontend/dist/.nojekyll

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
          force_orphan: true
