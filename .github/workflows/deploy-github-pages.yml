# Deploy SPA to GitHub Pages. Repo Settings → Pages → Source: GitHub Actions.
# Set repository secret VITE_API_URL to your backend origin (HTTPS, no /api suffix).
# Optional repository variable VITE_BASE_PATH — default is /<repo>/ for project pages.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Project site: https://OWNER.github.io/REPO/ — must match Pages URL path
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
        run: |
          REPO="${{ github.event.repository.name }}"
          BASE="${VITE_BASE_PATH}"
          if [ -z "$BASE" ]; then BASE="/${REPO}/"; fi
          export VITE_BASE_PATH="$BASE"
          if [ -z "${{ secrets.VITE_API_URL }}" ]; then echo "::warning::Secret VITE_API_URL is unset; UI will fail until you add it." >&2; fi
          npm ci
          npm run build

      - name: No Jekyll processing
        run: touch frontend/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
