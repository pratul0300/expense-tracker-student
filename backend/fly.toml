# Deploy: cd backend && fly deploy
# Postgres: fly postgres create … ; fly postgres attach <db> -a student-expense-tracker-api
# CORS origins must be host-only (no /repo path). Example:
#   fly secrets set CORS_ALLOWED_ORIGINS="https://YOURNAME.github.io,https://*.github.io" -a student-expense-tracker-api

app = "student-expense-tracker-api"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  PORT = "8080"
