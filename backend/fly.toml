# Fly.io app — deploy from backend/:  fly deploy
# Set secrets:  fly secrets set CORS_ALLOWED_ORIGINS="https://YOURNAME.github.io/REPO,https://*.github.io"

app = "student-expense-tracker-api"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  PORT = "8080"
