# Render Blueprint: Web service + Postgres (free tier availability depends on Render).
# After deploy set CORS_ALLOWED_ORIGINS to your Vercel URL(s).

databases:
  - name: student-expense-db
    plan: free
    databaseName: student_expenses
    ipAllowList: []

services:
  - type: web
    name: student-expense-tracker-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_OPTS
        value: -XX:+ExitOnOutOfMemoryError -Xmx512m
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_PROJECT.vercel.app,https://*.vercel.app,http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: student-expense-db
          property: connectionString
