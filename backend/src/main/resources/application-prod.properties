# PRODUCTION only — PostgreSQL (DATABASE_URL mapped by DatabaseUrlEnvironmentPostProcessor on Render).

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# GitHub Pages (https://*.github.io) covered by default; override with env CORS_ALLOWED_ORIGINS including your exact origins.
cors.allowed.origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.github.io}
server.port=${PORT:8080}
