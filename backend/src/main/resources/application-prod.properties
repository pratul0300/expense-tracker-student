# Activated with SPRING_PROFILES_ACTIVE=prod (Render).

# PostgreSQL datasource:
# Prefer Render Postgres "DATABASE_URL" (postgres://…); Startup maps it to JDBC before Boot binds properties.
# Or set JDBC explicitly ( JDBC URL tab on Render Postgres ):
#   SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/database
#   SPRING_DATASOURCE_USERNAME=
#   SPRING_DATASOURCE_PASSWORD=

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

spring.h2.console.enabled=false

# CORS origins (comma-separated). Include your Vercel production + preview origins, e.g.:
# https://your-app.vercel.app,https://*.vercel.app
# Fallback default is localhost (see application.properties CorsConfig default if unset).

cors.allowed.origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
server.port=${PORT:8080}
