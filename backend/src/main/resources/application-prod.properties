# PRODUCTION — PostgreSQL via DATABASE_URL (e.g. Fly Postgres attach; see DatabaseUrlEnvironmentPostProcessor).

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# CORS: leave CORS_ALLOWED_ORIGINS unset to allow any origin. Optional comma-separated patterns.
cors.allowed.origin-patterns=${CORS_ALLOWED_ORIGINS:}
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
