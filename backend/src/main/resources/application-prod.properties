# PRODUCTION — PostgreSQL via DATABASE_URL (e.g. Fly Postgres attach; see DatabaseUrlEnvironmentPostProcessor).

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

# Browser origins only (scheme + host, no path). Example: https://yourname.github.io
# Fly: fly secrets set CORS_ALLOWED_ORIGINS="https://yourname.github.io,https://*.github.io"
cors.allowed.origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.github.io}
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
