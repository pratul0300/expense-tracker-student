spring.application.name=student-expense-tracker

# Default profile for local dev (H2 in application-local.properties). Render sets SPRING_PROFILES_ACTIVE=prod.
spring.profiles.default=local

# Shared JPA behaviour (drivers / URLs are profile-specific)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

cors.allowed.origin-patterns=http://localhost:5173,http://localhost:3000
