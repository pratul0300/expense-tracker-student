spring.application.name=student-expense-tracker

## H2 in-memory datasource (persisted until JVM exit). JDBC URL documented for reference:
## jdbc:h2:mem:studentexpenses;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.url=jdbc:h2:mem:studentexpenses;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

cors.allowed.origin-patterns=http://localhost:5173,http://localhost:3000
