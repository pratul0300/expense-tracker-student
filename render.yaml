# Render Blueprint: Docker build + free Postgres DB.
# 1. Connect repo in Render → New Blueprint → select this render.yaml (or paste).
# 2. After deploy: set env CORS_ALLOWED_ORIGINS to your Vercel URL(s).

databases:
  - name: student-expense-db
    plan: free
    databaseName: student_expenses

services:
  - type: web
    name: student-expense-tracker-api
    plan: free
    rootDir: backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_PROJECT.vercel.app,https://*.vercel.app,http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: student-expense-db
          property: connectionString
